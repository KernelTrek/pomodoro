<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Pomodoro</h1>

        <div class="timer-display">
            <span class="time">25:00</span>
        </div>

        <div class="button-group">
            <button class="btn btn-start" onclick="startTimer()">Start</button>
            <button class="btn btn-stop" onclick="stopTimer()">Stop</button>
            <button class="btn btn-reset" onclick="resetTimer()">Reset</button>
        </div>

        <div class="settings-group">
            <button class="btn btn-settings" onclick="window.location.href='setting.html'">Settings</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
