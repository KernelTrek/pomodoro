<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Settings</title>
    <link rel="stylesheet" href="setting.css">
</head>
<body>
    <div class="container">
        <h3>Setting</h3>

        <div class="settings-form">
            <div class="input-group">
                <label for="timer-duration">Timer Duration (minutes):</label>
                <input type="number" id="timer-duration" min="1" max="60" value="25" placeholder="Enter minutes">
            </div>

            <button class="btn btn-complete" onclick="saveDuration()">Complete</button>
        </div>

        <div class="back-group">
            <button class="btn btn-back" onclick="window.history.back()">Back to Main</button>
        </div>
    </div>

    <script src="setting.js"></script>
</body>
</html>
